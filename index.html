<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Weyn — discover what's on near you</title>
    <meta name="description" content="Weyn — discover events near you in Muscat, tonight and in the weeks ahead." />

    <!-- Open Graph / Twitter — static defaults for every route except /e/:id,
         which gets its own dynamic per-event tags server-side (see the
         server-rendered route in server/app.js). This covers the homepage,
         Explore, You, Host, Admin, and any other client-rendered route
         shared as a link. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://weynevents.com/" />
    <meta property="og:site_name" content="Weyn" />
    <meta property="og:title" content="Weyn — discover what's on near you" />
    <meta property="og:description" content="Discover events near you in Muscat, tonight and in the weeks ahead." />
    <meta property="og:image" content="https://weynevents.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Weyn — discover what's on near you" />
    <meta name="twitter:description" content="Discover events near you in Muscat, tonight and in the weeks ahead." />
    <meta name="twitter:image" content="https://weynevents.com/og-image.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 124 124'%3E%3Crect width='124' height='124' rx='30' fill='%23FF3B30'/%3E%3Cg transform='translate(14 22)' fill='none' stroke='white' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M22 29 C27 52 32 67 43 72 C52 76 57 61 60 46' stroke-width='12.5'/%3E%3Cpath d='M60 46 C64 63 70 77 81 73 C93 69 98 50 101 32' stroke-width='22'/%3E%3C/g%3E%3Ccircle cx='115' cy='52' r='12.5' fill='white'/%3E%3C/svg%3E" />
    <!-- PWA: installable on iOS / Android / macOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Weyn" />
    <!-- set theme before paint to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("weyn.theme");
          if (t !== "light" && t !== "dark")
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = t;
          document.querySelector('meta[name="theme-color"]').setAttribute("content", t === "dark" ? "#1C1B1A" : "#FFFFFF");
          if (!localStorage.getItem("weyn.hasLaunched")) {
            document.documentElement.classList.add("show-splash");
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #splash { display: none; }
      html.show-splash #splash {
        display: flex; align-items: center; justify-content: center;
        position: fixed; inset: 0; z-index: 9999;
        background: #1C1B1A;
      }
      html.show-splash[data-theme="light"] #splash { background: #FFFFFF; }
      html.show-splash #splash svg { animation: splash-in 0.6s cubic-bezier(.16,1,.3,1) both; overflow: visible; }
      html.show-splash.splash-exit #splash svg { animation: splash-out 0.5s cubic-bezier(.4,0,1,1) both; }
      html.show-splash.splash-exit #splash { animation: splash-fade-out 0.5s ease both; pointer-events: none; }
      @keyframes splash-in { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
      @keyframes splash-out { from { opacity: 1; transform: scale(1); filter: blur(0); } to { opacity: 0; transform: scale(1.06); filter: blur(4px); } }
      @keyframes splash-fade-out { from { opacity: 1; } to { opacity: 0; } }
      /* Same "flowing ink" loop as LoadingMark (src/components/LoadingMark.tsx)
         — kept in sync by hand since this one has to run before React (and
         its stylesheet) exists at all. */
      #splash-s1, #splash-s2 { stroke-dasharray: 1; animation: splash-draw 1.8s cubic-bezier(.65,0,.35,1) infinite; }
      #splash-s2 { animation-delay: .08s; }
      #splash-dot { transform-box: fill-box; transform-origin: center; animation: splash-pulse 1.8s cubic-bezier(.65,0,.35,1) infinite; }
      @keyframes splash-draw { 0% { stroke-dashoffset: 1; } 45%, 55% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -1; } }
      @keyframes splash-pulse { 0%, 100% { transform: scale(0.82); opacity: .5; } 50% { transform: scale(1.12); opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        html.show-splash #splash svg, html.show-splash.splash-exit #splash svg, html.show-splash.splash-exit #splash,
        #splash-s1, #splash-s2, #splash-dot { animation: none !important; opacity: 1 !important; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Loaded non-render-blocking: preload the CSS, then swap it to a real
         stylesheet once fetched (the standard pattern for a synchronous
         <link rel="stylesheet"> to a third-party host, which otherwise
         blocks first paint on that round trip). `font-display: swap` in the
         URL already means text doesn't wait on the font file itself — this
         only stops the *CSS* fetch from blocking. Falls back to a plain
         stylesheet if JS is disabled. -->
    <!-- Plus Jakarta Sans / IBM Plex Mono dropped in favor of self-hosted Geist
         (see src/styles/tokens.css @font-face) — Noto Naskh Arabic (bilingual
         Arabic text) still loads from Google Fonts. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600&display=swap"
      />
    </noscript>
    <!-- Icons: Lucide webfont, self-hosted from /public/fonts (see src/lucide.css).
         Replaced the Tabler CDN stylesheet that used to load here. -->
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true">
      <svg width="72" height="58" viewBox="0 6 124 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="splashGrad" x1="12" y1="12" x2="112" y2="92" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#C93A30" />
            <stop offset="55%" stop-color="#FF3B30" />
            <stop offset="100%" stop-color="#FF6B5B" />
          </linearGradient>
        </defs>
        <path id="splash-s1" d="M22 29 C27 52 32 67 43 72 C52 76 57 61 60 46" stroke="url(#splashGrad)" stroke-width="12.5" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
        <path id="splash-s2" d="M60 46 C64 63 70 77 81 73 C93 69 98 50 101 32" stroke="url(#splashGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
        <circle id="splash-dot" cx="101" cy="30" r="12.5" fill="url(#splashGrad)"/>
      </svg>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

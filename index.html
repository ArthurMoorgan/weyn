<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Weyn — discover what's on near you</title>
    <meta name="description" content="Weyn — discover events near you in Muscat, tonight and in the weeks ahead." />

    <!-- Open Graph / Twitter — static defaults for every route except /e/:id,
         which gets its own dynamic per-event tags server-side (see the
         server-rendered route in server/app.js). This covers the homepage,
         Explore, You, Host, Admin, and any other client-rendered route
         shared as a link. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://weynevents.com/" />
    <meta property="og:site_name" content="Weyn" />
    <meta property="og:title" content="Weyn — discover what's on near you" />
    <meta property="og:description" content="Discover events near you in Muscat, tonight and in the weeks ahead." />
    <meta property="og:image" content="https://weynevents.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Weyn — discover what's on near you" />
    <meta name="twitter:description" content="Discover events near you in Muscat, tonight and in the weeks ahead." />
    <meta name="twitter:image" content="https://weynevents.com/og-image.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 124 124'%3E%3Crect width='124' height='124' rx='30' fill='%23161616'/%3E%3Cg transform='translate(14 22)' fill='none' stroke='white' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M22 29 C27 52 32 67 43 72 C52 76 57 61 60 46' stroke-width='12.5'/%3E%3Cpath d='M60 46 C64 63 70 77 81 73 C93 69 98 50 101 32' stroke-width='22'/%3E%3C/g%3E%3Ccircle cx='115' cy='52' r='12.5' fill='white'/%3E%3C/svg%3E" />
    <!-- PWA: installable on iOS / Android / macOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Weyn" />
    <!-- set theme before paint to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("weyn.theme");
          if (t !== "light" && t !== "dark")
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = t;
          document.querySelector('meta[name="theme-color"]').setAttribute("content", t === "dark" ? "#0A0A0A" : "#FFFFFF");
          /* Splash shows on every cold boot (native-app convention), not
             just first launch — dismissed by SplashDismisser once React
             mounts, with a minimum on-screen time set in src/splash.ts. */
          document.documentElement.classList.add("show-splash");
        } catch (e) {}
      })();
    </script>
    <style>
      /* ============================================================
         Splash — a staged, choreographed brand moment (not a loading
         loop). Timeline:
           0ms    scrim + soft vignette fade up
           80ms   fine left stroke draws on
           240ms  bold right stroke draws on (overlapping the first)
           620ms  the head dot pops as the second stroke arrives at it
           700ms  wordmark settles in underneath (letter-spacing eases)
           1.1s+  idle: the mark "breathes" (gentle scale) over a slow
                  glow pulse — calm, not busy
           exit   mark lifts + defocuses, glow collapses, scrim fades
         Everything is transform/opacity/dashoffset — compositor-cheap.
         Runs before React exists, so it's all hand-inlined here.
         ============================================================ */
      #splash { display: none; }
      /* The scrim itself is opaque from the very first frame — fading the
         container in let the app bleed through underneath on fast loads.
         Only the mark/vignette/wordmark animate; the exit still fades. */
      html.show-splash #splash {
        display: flex; align-items: center; justify-content: center;
        position: fixed; inset: 0; z-index: 9999;
        background: #0A0A0A; color: #F5F5F5;
      }
      html.show-splash[data-theme="light"] #splash { background: #FAFAFA; color: #0A0A0A; }

      /* Soft vignette so the field isn't dead-flat — barely-there light
         pooled behind the mark, like a stage. */
      #splash::before {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(56% 40% at 50% 44%, rgba(255,255,255,.055), transparent 70%);
        opacity: 0; animation: splash-vignette-in 1s ease .1s forwards;
      }
      html.show-splash[data-theme="light"] #splash::before {
        background: radial-gradient(56% 40% at 50% 44%, rgba(0,0,0,.045), transparent 70%);
      }
      @keyframes splash-vignette-in { to { opacity: 1; } }

      /* Glow halo behind the mark — pulses slowly during idle. A separate
         element (not a filter on the svg) so the mark itself stays crisp. */
      #splash-glow {
        position: absolute; width: 340px; height: 260px; border-radius: 50%;
        background: radial-gradient(50% 50% at 50% 50%, currentColor, transparent 70%);
        opacity: 0; pointer-events: none;
        animation:
          splash-glow-in 1.2s ease .5s forwards,
          splash-glow-pulse 3.2s ease-in-out 1.8s infinite;
      }
      @keyframes splash-glow-in { to { opacity: .07; } }
      @keyframes splash-glow-pulse {
        0%, 100% { opacity: .07; transform: scale(1); }
        50% { opacity: .11; transform: scale(1.08); }
      }

      /* The mark: settles in once, then breathes. Two stacked animations —
         entry (runs once) and the idle breathe (starts after entry). */
      html.show-splash #splash svg {
        overflow: visible; position: relative;
        animation:
          splash-mark-in .9s cubic-bezier(.22,1,.36,1) both,
          splash-breathe 3.2s ease-in-out 1.8s infinite;
      }
      @keyframes splash-mark-in { from { opacity: 0; transform: scale(.92) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }

      /* Strokes draw on ONCE, staggered and overlapping — an ink gesture,
         not a loading spinner. (The old version looped draw-in/draw-out
         forever, which read as "still waiting" rather than "arriving".) */
      #splash-s1, #splash-s2 { stroke-dasharray: 1; stroke-dashoffset: 1; }
      #splash-s1 { animation: splash-draw .62s cubic-bezier(.55,0,.15,1) .08s forwards; }
      #splash-s2 { animation: splash-draw .66s cubic-bezier(.55,0,.15,1) .24s forwards; }
      @keyframes splash-draw { to { stroke-dashoffset: 0; } }

      /* The head dot pops right as the bold stroke lands on it — swells a
         touch past rest then settles (smooth decel, no rubber bounce). */
      #splash-dot {
        transform-box: fill-box; transform-origin: center;
        transform: scale(0); opacity: 0;
        animation: splash-dot-pop .4s cubic-bezier(.22,1,.36,1) .62s forwards;
      }
      @keyframes splash-dot-pop {
        0% { transform: scale(0); opacity: 0; }
        65% { transform: scale(1.14); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      /* Wordmark: rises in while its tracking tightens — type settling
         into place rather than just fading on. */
      #splash-word {
        position: absolute; bottom: max(48px, env(safe-area-inset-bottom, 0px) + 40px);
        font: 500 13px/1 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 0.6em; text-transform: uppercase; opacity: 0;
        animation: splash-word-in .9s cubic-bezier(.22,1,.36,1) .7s forwards;
      }
      @keyframes splash-word-in {
        from { opacity: 0; letter-spacing: .6em; transform: translateY(8px); }
        to { opacity: .45; letter-spacing: .35em; transform: translateY(0); }
      }

      /* Exit: the mark lifts toward the viewer and defocuses while the
         glow collapses — reads as the app surfacing up through it. */
      html.show-splash.splash-exit #splash svg { animation: splash-mark-out .45s cubic-bezier(.4,0,.2,1) both; }
      html.show-splash.splash-exit #splash-glow { animation: splash-glow-out .35s ease both; }
      html.show-splash.splash-exit #splash-word { animation: splash-word-out .3s ease both; }
      html.show-splash.splash-exit #splash { animation: splash-scrim-out .5s ease .05s both; pointer-events: none; }
      @keyframes splash-mark-out { from { opacity: 1; transform: scale(1); filter: blur(0); } to { opacity: 0; transform: scale(1.08); filter: blur(8px); } }
      @keyframes splash-glow-out { to { opacity: 0; transform: scale(.9); } }
      @keyframes splash-word-out { to { opacity: 0; transform: translateY(6px); } }
      @keyframes splash-scrim-out { from { opacity: 1; } to { opacity: 0; } }

      @media (prefers-reduced-motion: reduce) {
        html.show-splash #splash, html.show-splash #splash::before, html.show-splash #splash svg,
        html.show-splash.splash-exit #splash, html.show-splash.splash-exit #splash svg,
        #splash-glow, #splash-word, #splash-s1, #splash-s2, #splash-dot {
          animation: none !important; opacity: 1 !important;
        }
        #splash-s1, #splash-s2 { stroke-dashoffset: 0 !important; }
        #splash-dot { transform: scale(1) !important; }
        #splash-glow { opacity: .07 !important; }
        #splash-word { opacity: .45 !important; }
        html.show-splash.splash-exit #splash { opacity: 0 !important; transition: opacity .2s ease; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Loaded non-render-blocking: preload the CSS, then swap it to a real
         stylesheet once fetched (the standard pattern for a synchronous
         <link rel="stylesheet"> to a third-party host, which otherwise
         blocks first paint on that round trip). `font-display: swap` in the
         URL already means text doesn't wait on the font file itself — this
         only stops the *CSS* fetch from blocking. Falls back to a plain
         stylesheet if JS is disabled. -->
    <!-- Plus Jakarta Sans / IBM Plex Mono dropped in favor of self-hosted Geist
         (see src/styles/tokens.css @font-face) — Noto Naskh Arabic (bilingual
         Arabic text) still loads from Google Fonts. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600&display=swap"
      />
    </noscript>
    <!-- Icons: Lucide webfont, self-hosted from /public/fonts (see src/lucide.css).
         Replaced the Tabler CDN stylesheet that used to load here. -->
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true">
      <!-- Soft halo behind the mark — see the splash <style> block. -->
      <div id="splash-glow"></div>
      <!-- Monochrome W mark, sized as a real brand moment (not a favicon
           floating in a void) — currentColor follows the theme set on
           #splash above: white-on-off-black dark, black-on-off-white light. -->
      <svg width="119" height="96" viewBox="0 6 124 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="splash-s1" d="M22 29 C27 52 32 67 43 72 C52 76 57 61 60 46" stroke="currentColor" stroke-width="12.5" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
        <path id="splash-s2" d="M60 46 C64 63 70 77 81 73 C93 69 98 50 101 32" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
        <circle id="splash-dot" cx="101" cy="30" r="12.5" fill="currentColor"/>
      </svg>
      <span id="splash-word">Weyn</span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Weyn — discover what's on near you</title>
    <meta name="description" content="Weyn — discover events near you in Muscat, tonight and in the weeks ahead." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 124 124'%3E%3Crect width='124' height='124' rx='30' fill='%234F46E5'/%3E%3Cg transform='translate(14 22)' fill='none' stroke='white' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M22 29 C27 52 32 67 43 72 C52 76 57 61 60 46' stroke-width='12.5'/%3E%3Cpath d='M60 46 C64 63 70 77 81 73 C93 69 98 50 101 32' stroke-width='22'/%3E%3C/g%3E%3Ccircle cx='115' cy='52' r='12.5' fill='white'/%3E%3C/svg%3E" />
    <!-- PWA: installable on iOS / Android / macOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Weyn" />
    <!-- set theme before paint to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("weyn.theme");
          if (t !== "light" && t !== "dark")
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = t;
          document.querySelector('meta[name="theme-color"]').setAttribute("content", t === "dark" ? "#0E1116" : "#FFFFFF");
          if (!localStorage.getItem("weyn.hasLaunched")) {
            document.documentElement.classList.add("show-splash");
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #splash { display: none; }
      html.show-splash #splash {
        display: flex; align-items: center; justify-content: center;
        position: fixed; inset: 0; z-index: 9999;
        background: #0E1116; color: #6F5BFF;
      }
      html.show-splash[data-theme="light"] #splash { background: #F6F7F9; color: #635BFF; }
      html.show-splash #splash svg { animation: splash-in 0.6s cubic-bezier(.16,1,.3,1) both; }
      html.show-splash.splash-exit #splash svg { animation: splash-out 0.5s cubic-bezier(.4,0,1,1) both; }
      html.show-splash.splash-exit #splash { animation: splash-fade-out 0.5s ease both; pointer-events: none; }
      @keyframes splash-in { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
      @keyframes splash-out { from { opacity: 1; transform: scale(1); filter: blur(0); } to { opacity: 0; transform: scale(1.06); filter: blur(4px); } }
      @keyframes splash-fade-out { from { opacity: 1; } to { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) {
        html.show-splash #splash svg, html.show-splash.splash-exit #splash svg, html.show-splash.splash-exit #splash { animation: none !important; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Icons: Lucide webfont, self-hosted from /public/fonts (see src/lucide.css).
         Replaced the Tabler CDN stylesheet that used to load here. -->
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true">
      <svg width="72" height="58" viewBox="0 6 124 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 29 C27 52 32 67 43 72 C52 76 57 61 60 46" stroke="currentColor" stroke-width="12.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M60 46 C64 63 70 77 81 73 C93 69 98 50 101 32" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="101" cy="30" r="12.5" fill="currentColor"/>
      </svg>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

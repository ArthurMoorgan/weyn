# Render Blueprint — https://render.com/docs/blueprint-spec
# One-click deploy: push this repo to GitHub, then in the Render dashboard
# choose "New +" → "Blueprint" and point it at the repo. Render reads this file automatically.
services:
  - type: web
    name: weyn-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    # ⚠️ Render's free tier doesn't support persistent disks. Events/bookings
    # are safe either way (they live in Postgres via DATABASE_URL below), but
    # uploaded event photos (server/uploads/, DATA_DIR) are ephemeral on free
    # tier — they're wiped on every redeploy/restart. Fine for now; move to
    # S3/Cloudflare R2 (or upgrade to a paid Render plan + re-add a `disk:`
    # block) before this matters for real organizers uploading real photos.
    envVars:
      - key: NODE_ENV
        value: production   # enforces a real CORS_ORIGIN allowlist instead of the permissive local-dev default
      - key: CORS_ORIGIN
        sync: false # set in the Render dashboard to your real deployed frontend origin(s), comma-separated — required in production
      - key: DATABASE_URL
        sync: false # set in the Render dashboard — your Neon Postgres connection string
      - key: SESSION_SECRET
        sync: false # set in the Render dashboard — generate with: node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      - key: PAYTABS_PROFILE_ID
        sync: false
      - key: PAYTABS_SERVER_KEY
        sync: false
      - key: PAYTABS_API_BASE
        value: https://secure.paytabs.com # confirm your account's actual regional domain in the PayTabs dashboard

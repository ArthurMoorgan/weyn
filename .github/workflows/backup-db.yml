name: Nightly database backup

# Free-tier Neon only keeps ~24h of point-in-time recovery — this workflow
# is the actual safety net beyond that window. Runs every night, dumps the
# whole database with pg_dump (schema + data, in Postgres's native custom
# format so it can be restored directly with pg_restore), and keeps it as
# a workflow artifact. GitHub retains artifacts for 90 days by default, so
# this gives a 90-day rolling window of nightly snapshots at zero extra cost
# and no third-party storage account needed.
on:
  schedule:
    # 23:00 UTC = 03:00 Asia/Muscat — low-traffic hours
    - cron: "0 23 * * *"
  workflow_dispatch: {} # lets you trigger a manual backup anytime from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        # Ubuntu's default apt repo ships pg_dump 16, but Neon runs Postgres 18 —
        # pg_dump refuses to dump a server newer than itself, so pull the
        # PGDG apt repo to get a client version that matches (or exceeds) it.
        run: |
          sudo apt-get install --yes curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo "$VERSION_CODENAME")-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-18

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set — see .github/workflows/backup-db.yml for setup"
            exit 1
          fi
          STAMP=$(date -u +%Y-%m-%d)
          pg_dump "$DATABASE_URL" --format=custom --no-owner --no-privileges --file="weyn-backup-${STAMP}.dump"
          echo "BACKUP_STAMP=${STAMP}" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: weyn-db-backup-${{ env.BACKUP_STAMP }}
          path: weyn-backup-${{ env.BACKUP_STAMP }}.dump
          retention-days: 90

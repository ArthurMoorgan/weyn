name: CI

# Runs on every push/PR to main — typecheck, build, and the test suite.
# Before this workflow, nothing checked a commit before it reached
# production; every deploy relied entirely on manual verification (see the
# engineering audit's #1 finding). This doesn't block deploys by itself
# (deploys are still manual `vercel deploy --prod`), but a red X on a commit
# is now visible instead of silent.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Several deps (@capacitor/cli, wrangler, miniflare, @prisma/streams-local)
          # now require Node >=22 — on Node 20 `npm ci` fails because npm resolves a
          # different set of optional platform packages than what's in the lock file.
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # Prisma client is generated code (gitignored) that the TS build and
      # server both import from — needs to exist before either can run.
      - run: npx prisma generate

      - run: npm run build

      - run: npm test

# Fly.io config — alternative to Render. Deploy with:
#   fly launch --copy-config --no-deploy   (first time, creates the app)
#   fly volumes create weyn_data --size 1  (persistent disk for uploads/data.json)
#   fly deploy
app = "weyn-api" # must be globally unique — fly will prompt to rename if taken
primary_region = "fra" # pick the region closest to Muscat available on your plan

[build]
  dockerfile = "server/Dockerfile"

[env]
  DATA_DIR = "/data"
  NODE_ENV = "production"   # enforces a real CORS_ORIGIN allowlist instead of the permissive local-dev default
  PAYTABS_API_BASE = "https://secure.paytabs.com" # confirm your account's actual regional domain in the PayTabs dashboard
  # DATABASE_URL, SESSION_SECRET, CORS_ORIGIN, PAYTABS_PROFILE_ID, PAYTABS_SERVER_KEY are secrets —
  # set with: fly secrets set DATABASE_URL=... SESSION_SECRET=... CORS_ORIGIN=... PAYTABS_PROFILE_ID=... PAYTABS_SERVER_KEY=...

[[mounts]]
  source = "weyn_data"
  destination = "/data"

[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
